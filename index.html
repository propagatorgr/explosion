<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulation</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #eef2f5;
  text-align: center;
}

canvas {
  display: block;
  margin: 0 auto;
}

/* --- MAIN ROW --- */
.topRow {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 60px;
  margin-top: 10px;
  flex-wrap: wrap;
}

/* --- CONTROL BLOCK --- */
.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

/* dropdown row */
.rowInputs {
  display: flex;
  gap: 15px;
}

/* BUTTONS */
.buttons {
  margin-top: 6px;
}

/* PANEL STYLE */
.panel {
  background: #f4f7fb;
  border: 1px solid #cfd9e3;
  padding: 12px;
  border-radius: 8px;
  min-width: 150px;
  text-align: left;
  box-shadow: 0 3px 8px rgba(0,0,0,0.12);
}

.panel div {
  padding: 4px 0;
  border-bottom: 1px solid #e3edf5;
}

.panel div:last-child {
  border-bottom: none;
}
</style>

</head>

<body>

<div id="sketch-holder"></div>

<div class="topRow">

  <div class="controls">

    <div>
      u0: <span id="u0val">20</span><br>
      <input type="range" id="u0" min="5" max="50" value="20">
    </div>

    <div class="rowInputs">
      <div>
        Μάζα δεξιά:<br>
        <select id="fraction">
          <option value="1/2">m/2</option>
          <option value="1/3">m/3</option>
          <option value="2/3">2m/3</option>
          <option value="1/4">m/4</option>
          <option value="3/4">3m/4</option>
        </select>
      </div>

      <div>
        Ενέργεια:<br>
        <select id="energy">
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="40">40</option>
          <option value="80">80</option>
        </select>
      </div>
    </div>

    <div class="buttons">
      <button onclick="startMotion()">Εκκίνηση</button>
      <button onclick="explode()">Έκρηξη</button>
      <button onclick="resetSim()">RESET</button>
      <button id="pauseBtn" onclick="togglePause()">Stop</button>
    </div>

  </div>

  <div class="panel">
    <div>t = <span id="t">0</span></div>
    <div>h(t) = <span id="h">0</span></div>
    <div>S1 = <span id="s1">-</span></div>
    <div>S2 = <span id="s2">-</span></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
<script src="sketch.js"></script>

</body>
</html>
