<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulation</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #eef2f5;
  text-align: center;
}

canvas {
  display: block;
  margin: 0 auto;
}

.topRow {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 80px;
  margin-top: 10px;
}

.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.rowInputs {
  display: flex;
  gap: 15px;
}

.buttons {
  margin-top: 6px;
}

.panel {
  background: #f4f7fb;
  border: 1px solid #cfd9e3;
  padding: 12px;
  border-radius: 8px;
  min-width: 170px;
  text-align: left;
  box-shadow: 0 3px 8px rgba(0,0,0,0.12);
  margin-top: 28px;
}

.panel div {
  padding: 5px 0;
  border-bottom: 1px solid #e3edf5;
}

.panel div:last-child {
  border-bottom: none;
}
</style>

</head>

<body>

<div id="sketch-holder"></div>

<div class="topRow">

  <div class="controls">

    <div>
      u<sub>0</sub>: <span id="u0val">20</span><br>
      <input type="range" id="u0" min="5" max="50" value="20">
    </div>

    <div class="rowInputs">

      <div>
        Μάζα δεξιά:<br>
        <select id="fraction">
          <option value="1/2">m/2</option>
          <option value="1/3">m/3</option>
          <option value="2/3">2m/3</option>
          <option value="1/4">m/4</option>
          <option value="3/4">3m/4</option>
        </select>
      </div>

      <div>
        Ενέργεια έκρηξης:<br>
        <select id="energy">
          <option value="1">E</option>
          <option value="2">2E</option>
          <option value="4">4E</option>
          <option value="8">8E</option>
        </select>
      </div>

    </div>

    <div class="buttons">
      <button onclick="startMotion()">Εκκίνηση</button>
      <button onclick="explode()">Έκρηξη</button>
      <button onclick="resetSim()">RESET</button>
      <button id="pauseBtn" onclick="togglePause()">Stop</button>
    </div>

  </div>

  <div class="panel">
    <div>t = <span id="t">0</span></div>
    <div>h = <span id="h">0</span></div>
    <div>S<sub>1</sub> / S<sub>2</sub> = <span id="ratioS">-</span></div>
    <div>u<sub>1</sub> / u<sub>2</sub> = <span id="ratioU">-</span></div>
    <div>E<sub>1</sub> / E<sub>2</sub> = <span id="ratioE">-</span></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
<script src="sketch.js"></script>

</body>
</html>
