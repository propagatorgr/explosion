<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulation</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #eef2f5;
  text-align: center;
}

canvas {
  display: block;
  margin: 0 auto;
}

/* Layout */
.topRow {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 40px;
  margin-top: 10px;
  flex-wrap: wrap;
}

/* Controls */
.controls {
  text-align: left;
}

/* Panel style */
.panel {
  background: #f8fbff;
  border: 1px solid #ccd7e0;
  padding: 12px;
  border-radius: 6px;
  min-width: 150px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  text-align: left;
}

.panel div {
  margin: 4px 0;
  border-bottom: 1px solid #e5eef5;
  padding-bottom: 3px;
}

/* Buttons */
.buttons {
  margin-top: 10px;
}
</style>

</head>

<body>

<div id="sketch-holder"></div>

<div class="topRow">

  <div class="controls">
    u0: <span id="u0val">20</span><br>
    <input type="range" id="u0" min="5" max="50" value="20">

    <br>

    Μάζα δεξιά:
    <select id="fraction">
      <option value="1/2">m/2</option>
      <option value="1/3">m/3</option>
      <option value="2/3">2m/3</option>
      <option value="1/4">m/4</option>
      <option value="3/4">3m/4</option>
    </select>

    <br>

    Ενέργεια:
    <select id="energy">
      <option value="10">10</option>
      <option value="20">20</option>
      <option value="40">40</option>
      <option value="80">80</option>
    </select>

    <div class="buttons">
      <button onclick="startMotion()">Εκκίνηση</button>
      <button onclick="explode()">Έκρηξη</button>
      <button onclick="resetSim()">RESET</button>
      <button id="pauseBtn" onclick="togglePause()">Stop</button>
    </div>
  </div>

  <div class="panel">
    <div>t = <span id="t">0</span></div>
    <div>h(t) = <span id="h">0</span></div>
    <div>S1 = <span id="s1">-</span></div>
    <div>S2 = <span id="s2">-</span></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
<script src="sketch.js"></script>

</body>
</html>
